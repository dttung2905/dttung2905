name: Update PR Contributions

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build contributions table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import subprocess, re, datetime
          from urllib.parse import quote

          username = "dttung2905"
          groups = [
              ("KEDA", [
                  "kedacore/keda",
                  "kedacore/keda-docs",
              ]),
              ("Apache Iceberg", [
                  "apache/iceberg-go",
                  "apache/terraform-provider-iceberg",
              ]),
              ("KAI Scheduler", [
                  "kai-scheduler/KAI-Scheduler",
              ]),
          ]

          def count(repo, state):
              q = quote(f"author:{username} type:pr repo:{repo} is:{state}", safe=":/")
              r = subprocess.run(
                  ["gh", "api", f"search/issues?q={q}&per_page=1", "--jq", ".total_count"],
                  capture_output=True, text=True,
              )
              return int(r.stdout.strip() or "0")

          def build_table():
              rows = []
              for name, repos in groups:
                  for i, repo in enumerate(repos):
                      m = count(repo, "merged")
                      o = count(repo, "open")
                      url = f"https://github.com/{repo}"
                      project = f"**{name}**" if i == 0 else ""
                      rows.append(f"| {project} | [{repo}]({url}) | {m} | {o} |")
              return "\n".join([
                  "| Project | Repo | Merged | Open |",
                  "|---------|------|-------:|-----:|",
                  *rows,
              ])

          today = datetime.date.today().isoformat()
          block = build_table() + f"\n\n_Updated: {today}_"

          with open("README.md") as f:
              content = f.read()

          new_content = re.sub(
              r"<!-- CONTRIBUTIONS_START -->.*?<!-- CONTRIBUTIONS_END -->",
              f"<!-- CONTRIBUTIONS_START -->\n{block}\n<!-- CONTRIBUTIONS_END -->",
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print("Done.")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: update PR contribution stats" &&
            git push
          )
